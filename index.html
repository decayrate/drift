<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drift</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <div id="logo">
          <!-- Snooze Cruise logo: car + crescent moon + floating Z's + stars -->
          <svg width="36" height="32" viewBox="0 0 36 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Stars -->
            <circle cx="3"  cy="5"  r="0.9" fill="#4f8ef7" opacity="0.7"/>
            <circle cx="7"  cy="2"  r="0.65" fill="#4f8ef7" opacity="0.6"/>
            <circle cx="11" cy="5"  r="0.7" fill="#4f8ef7" opacity="0.5"/>

            <!-- Crescent moon (top-right) -->
            <path d="M28 1C25.2 1 23 3.2 23 6C23 8.8 25.2 11 28 11C26.3 11 25 9.5 25 7.5C25 4.5 26.5 2.5 28 1Z" fill="#4f8ef7"/>

            <!-- Floating Z's rising from car cabin -->
            <!-- Z1 (small, highest) -->
            <path d="M18 3.5 L20.5 3.5 L18 6 L20.5 6" stroke="#4f8ef7" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
            <!-- Z2 (medium) -->
            <path d="M14.5 5.5 L17.5 5.5 L14.5 8.5 L17.5 8.5" stroke="#4f8ef7" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
            <!-- Z3 (largest, just above roof) -->
            <path d="M10 7.5 L13.5 7.5 L10 11 L13.5 11" stroke="#4f8ef7" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

            <!-- Car cabin / roof -->
            <path d="M5 18 L8.5 12 Q9.5 11 11 11 H23 Q24.5 11 25.5 12 L29 18 Z" fill="#3571d8"/>

            <!-- Windows -->
            <rect x="10" y="12.5" width="5"   height="4.5" rx="1" fill="#0d1a35"/>
            <rect x="16.5" y="12.5" width="5" height="4.5" rx="1" fill="#0d1a35"/>

            <!-- Crescent moon in left window (baby sleeping) -->
            <path d="M11 14.8C11 13.4 12 12.5 13.5 12.9C12.5 13 12 13.8 12 14.8C12 15.8 12.5 16.5 13.5 16.7C12 17 11 16.2 11 14.8Z" fill="#4f8ef7"/>

            <!-- Tiny star in right window -->
            <circle cx="19.5" cy="15" r="0.85" fill="#4f8ef7" opacity="0.8"/>
            <circle cx="21"   cy="13.5" r="0.55" fill="#4f8ef7" opacity="0.6"/>

            <!-- Car body -->
            <rect x="2" y="18" width="32" height="9" rx="3" fill="#4f8ef7"/>

            <!-- Wheel arches -->
            <rect x="2"  y="22" width="10" height="5" rx="1" fill="#3571d8"/>
            <rect x="24" y="22" width="10" height="5" rx="1" fill="#3571d8"/>

            <!-- Wheels -->
            <circle cx="8"  cy="27" r="4" fill="#0d1117"/>
            <circle cx="28" cy="27" r="4" fill="#0d1117"/>
            <circle cx="8"  cy="27" r="1.6" fill="#21262d"/>
            <circle cx="28" cy="27" r="1.6" fill="#21262d"/>
            <circle cx="8"  cy="27" r="0.6" fill="#30363d"/>
            <circle cx="28" cy="27" r="0.6" fill="#30363d"/>

            <!-- Headlight -->
            <rect x="33" y="19.5" width="2" height="3" rx="0.6" fill="#fef3c7"/>

            <!-- Tail light -->
            <rect x="1" y="19.5" width="2" height="3" rx="0.6" fill="#fca5a5" opacity="0.8"/>
          </svg>
          <h1>Drift</h1>
        </div>
        <p class="tagline">Drive your baby to sleep</p>
      </div>

      <div id="controls">
        <!-- Start Location -->
        <div class="control-group">
          <label for="start-input">Starting Point</label>
          <div class="input-row">
            <div class="search-wrap">
              <input
                type="text"
                id="start-input"
                placeholder="Enter address or place..."
                autocomplete="off"
              />
              <ul id="suggestions" class="hidden"></ul>
            </div>
            <button id="locate-btn" title="Use my current location">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Duration -->
        <div class="control-group">
          <label for="duration-slider">
            Duration
            <span id="duration-display" class="value-badge">60 min</span>
          </label>
          <input
            type="range"
            id="duration-slider"
            min="10"
            max="240"
            value="60"
            step="5"
          />
          <div class="range-labels">
            <span>10 min</span>
            <span>4 hrs</span>
          </div>
        </div>

        <!-- Road Preference -->
        <div class="control-group">
          <label>Road Preference</label>
          <div class="toggle-group" id="road-preference">
            <button class="toggle-btn" data-value="motorway">Motorway</button>
            <button class="toggle-btn active" data-value="balanced">Balanced</button>
            <button class="toggle-btn" data-value="scenic">Scenic</button>
          </div>
          <p class="help-text">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Motorway routes minimise traffic lights and stops
          </p>
        </div>

        <!-- Find Routes Button -->
        <button id="find-routes-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
            <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Find Routes
        </button>
      </div>

      <!-- Results -->
      <div id="results" class="hidden">
        <div id="results-header">
          <h2>Routes Found</h2>
          <span id="results-count"></span>
        </div>
        <div id="route-list"></div>
      </div>

      <!-- Loading -->
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Calculating routes...</p>
      </div>

      <!-- Error -->
      <div id="error-msg" class="hidden"></div>
    </aside>

    <!-- Map -->
    <main id="map-container">
      <div id="map"></div>
      <div id="map-placeholder">
        <div class="placeholder-content">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="#4f8ef7" stroke-width="1.5"/>
            <circle cx="12" cy="9" r="2.5" stroke="#4f8ef7" stroke-width="1.5"/>
          </svg>
          <h3>Enter a starting point</h3>
          <p>Set your start location and duration, then find your perfect loop.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Route card template (cloned in JS) -->
  <template id="route-card-template">
    <div class="route-card">
      <div class="route-card-header">
        <div class="route-color-dot"></div>
        <div class="route-name"></div>
        <button class="route-select-btn">Select</button>
      </div>
      <div class="route-stats">
        <div class="stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="stat-time"></span>
        </div>
        <div class="stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <path d="M3 12h18M12 3l9 9-9 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="stat-distance"></span>
        </div>
      </div>
      <div class="route-summary"></div>
      <div class="route-links hidden">
        <a class="map-link google-link" target="_blank" rel="noopener noreferrer">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="2"/>
          </svg>
          Google Maps
        </a>
        <a class="map-link apple-link" target="_blank" rel="noopener noreferrer">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="2"/>
          </svg>
          Apple Maps
        </a>
      </div>
    </div>
  </template>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
